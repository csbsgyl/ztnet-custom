name: Validate deployment

on:
  push:
    branches:
      - main
    paths:
      - "deploy/**"
      - "container-ops.mjs"
      - "Dockerfile"
      - "Dockerfile.ops"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "deploy/**"
      - "container-ops.mjs"
      - "Dockerfile"
      - "Dockerfile.ops"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployment-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check installer syntax
        run: bash -n deploy/one-click-install.sh

      - name: Verify immutable action references
        run: |
          reference_is_immutable() {
            local reference="$1"
            local revision

            case "$reference" in
              ./*) return 0 ;;
              *@*)
                revision="${reference##*@}"
                [[ "$revision" =~ ^[0-9a-fA-F]{40}$ ]]
                ;;
              *) return 1 ;;
            esac
          }

          for invalid_reference in \
            actions/example@v4.2.2 \
            actions/example@release \
            actions/example@1234567; do
            if reference_is_immutable "$invalid_reference"; then
              echo "Action reference validator accepted ${invalid_reference}." >&2
              exit 1
            fi
          done

          invalid=0
          while IFS= read -r workflow; do
            while IFS= read -r reference; do
              if ! reference_is_immutable "$reference"; then
                echo "${workflow}: mutable or invalid action reference ${reference}" >&2
                invalid=1
              fi
            done < <(
              sed -nE "s/^[[:space:]]*(-[[:space:]]*)?uses:[[:space:]]*['\"]?([^'\"[:space:]#]+).*/\\2/p" "$workflow"
            )
          done < <(
            find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) -print
          )
          exit "$invalid"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Test container operations helper
        run: node --test deploy/tests/container-ops.test.mjs

      - name: Build restart helper image
        run: docker build -f Dockerfile.ops -t ztnet-restart-helper:test .

      - name: Test installer mirror selection
        run: bash deploy/tests/one-click-install-test.sh

      - name: Test fork preparation
        run: bash deploy/tests/prepare-github-fork-test.sh

      - name: Validate Docker Compose
        run: |
          docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml config --quiet

          generated_dir="$(mktemp -d)"
          trap 'rm -rf "$generated_dir"' EXIT
          export INSTALL_DIR="$generated_dir"
          export ZTNET_INSTALLER_SOURCE_ONLY=1
          source deploy/one-click-install.sh
          mkdir -p "$INSTALL_DIR"
          write_env_file
          write_compose_file
          docker compose --env-file "$INSTALL_DIR/.env" -f "$INSTALL_DIR/docker-compose.yml" config --quiet

          AUTO_UPDATE=false
          write_compose_file
          docker compose --env-file "$INSTALL_DIR/.env" -f "$INSTALL_DIR/docker-compose.yml" config --quiet
