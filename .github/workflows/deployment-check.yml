name: Validate deployment

on:
  push:
    branches:
      - main
    paths:
      - "deploy/**"
      - "container-ops.mjs"
      - "Dockerfile"
      - "Dockerfile.ops"
      - ".github/workflows/deployment-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "deploy/**"
      - "container-ops.mjs"
      - "Dockerfile"
      - "Dockerfile.ops"
      - ".github/workflows/deployment-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployment-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check installer syntax
        run: bash -n deploy/one-click-install.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Test container operations helper
        run: node --test deploy/tests/container-ops.test.mjs

      - name: Build restart helper image
        run: docker build -f Dockerfile.ops -t ztnet-restart-helper:test .

      - name: Verify GitHub accelerator
        env:
          ACCELERATED_SCRIPT_URL: https://github.xiaohangyun.org/https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/deploy/one-click-install.sh
        run: |
          accelerated_script="$(mktemp)"
          trap 'rm -f "$accelerated_script"' EXIT
          for attempt in 1 2 3; do
            if curl -fsSL --connect-timeout 8 --max-time 30 "$ACCELERATED_SCRIPT_URL" -o "$accelerated_script" &&
              cmp -s deploy/one-click-install.sh "$accelerated_script"; then
              exit 0
            fi
            sleep 5
          done
          echo "GitHub accelerator did not return the committed installer." >&2
          exit 1

      - name: Test installer mirror selection
        run: bash deploy/tests/one-click-install-test.sh

      - name: Validate Docker Compose
        run: |
          docker compose --env-file deploy/.env.example -f deploy/docker-compose.yml config --quiet

          generated_dir="$(mktemp -d)"
          trap 'rm -rf "$generated_dir"' EXIT
          export INSTALL_DIR="$generated_dir"
          export ZTNET_INSTALLER_SOURCE_ONLY=1
          source deploy/one-click-install.sh
          mkdir -p "$INSTALL_DIR"
          write_env_file
          write_compose_file
          docker compose --env-file "$INSTALL_DIR/.env" -f "$INSTALL_DIR/docker-compose.yml" config --quiet

          AUTO_UPDATE=false
          write_compose_file
          docker compose --env-file "$INSTALL_DIR/.env" -f "$INSTALL_DIR/docker-compose.yml" config --quiet
