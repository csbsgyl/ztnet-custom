name: Application CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "install.ztnet/**"
      - ".github/**"
      - "**/*.md"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: application-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Create CI environment
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          NEXTAUTH_SECRET=dummy_key
          NEXTAUTH_URL=http://localhost:3000
          NEXT_PUBLIC_APP_VERSION=ci
          IS_GITHUB_ACTION=true
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
