services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15.2-alpine}
    container_name: ${APP_NAME:-ztnet-custom}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ztnet}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  zerotier:
    image: ${ZEROTIER_IMAGE:-zyclonite/zerotier:1.14.2}
    hostname: zerotier
    container_name: ${APP_NAME:-ztnet-custom}-zerotier
    restart: unless-stopped
    volumes:
      - zerotier:/var/lib/zerotier-one
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - app-network
    ports:
      - "9993:9993/udp"
    environment:
      - ZT_OVERRIDE_LOCAL_CONF=true
      - ZT_ALLOW_MANAGEMENT_FROM=${APP_SUBNET:-172.31.255.0/29}
    labels:
      io.ztnet.instance: "${APP_NAME:-ztnet-custom}"
      io.ztnet.role: zerotier
      io.ztnet.restart-enabled: "true"

  ztnet:
    image: ${ZTNET_IMAGE:-ghcr.io/csbsgyl/ztnet-custom:latest}
    container_name: ${APP_NAME:-ztnet-custom}
    working_dir: /app
    restart: unless-stopped
    volumes:
      - zerotier:/var/lib/zerotier-one
      - ./backups:/app/backups
    ports:
      - "${PUBLIC_BIND:-127.0.0.1}:${HTTP_PORT:-3000}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ztnet}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL_INTERNAL: http://ztnet:3000
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      RATE_LIMIT_TRUST_PROXY: ${RATE_LIMIT_TRUST_PROXY:-false}
      AUTO_UPDATE: ${AUTO_UPDATE:-true}
      AUTO_UPDATE_INTERVAL: ${AUTO_UPDATE_INTERVAL:-3600}
      ZTNET_IMAGE: ${ZTNET_IMAGE:-ghcr.io/csbsgyl/ztnet-custom:latest}
      UPDATE_API_URL: ${UPDATE_API_URL:-http://updater:8080}
      UPDATE_API_TOKEN: ${UPDATE_API_TOKEN:?UPDATE_API_TOKEN is required}
      RESTART_API_URL: ${RESTART_API_URL:-http://restart-helper:8081}
      RESTART_API_TOKEN: ${RESTART_API_TOKEN:?RESTART_API_TOKEN is required}
      BACKUP_DIR: /app/backups
    networks:
      - app-network
      - ops-network
    labels:
      com.centurylinklabs.watchtower.enable: "${AUTO_UPDATE:-true}"
      com.centurylinklabs.watchtower.scope: "${APP_NAME:-ztnet-custom}"
    depends_on:
      - postgres
      - zerotier

  restart-helper:
    image: ${RESTART_HELPER_IMAGE:-ghcr.io/csbsgyl/ztnet-custom@sha256:207fe36e7d8ebec6335f83601dac18aa1d2d89cd5b662b63c4277675091533bd}
    container_name: ${APP_NAME:-ztnet-custom}-restart-helper
    restart: unless-stopped
    entrypoint: ["node", "/app/container-ops.mjs"]
    command: []
    environment:
      OPS_SCOPE: ${APP_NAME:-ztnet-custom}
      OPS_PORT: 8081
      RESTART_API_TOKEN: ${RESTART_API_TOKEN:?RESTART_API_TOKEN is required}
    expose:
      - "8081"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ops-network
    depends_on:
      - zerotier

  updater:
    profiles:
      - auto-update
    image: ${UPDATER_IMAGE:-nickfedor/watchtower@sha256:c1dfdf27fe805dcfefe1cf048cee6960a511c097a99aa355b0bc4be6e6bb3bdf}
    container_name: ${APP_NAME:-ztnet-custom}-updater
    restart: unless-stopped
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: "${APP_NAME:-ztnet-custom}"
      WATCHTOWER_POLL_INTERVAL: "${AUTO_UPDATE_INTERVAL:-3600}"
      WATCHTOWER_CLEANUP: "${AUTO_UPDATE_CLEANUP:-false}"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_PERIODIC_POLLS: "true"
      WATCHTOWER_HTTP_API_METRICS: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${UPDATE_API_TOKEN:?UPDATE_API_TOKEN is required}
    labels:
      com.centurylinklabs.watchtower.scope: "${APP_NAME:-ztnet-custom}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

volumes:
  zerotier:
  postgres-data:

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${APP_SUBNET:-172.31.255.0/29}
  ops-network:
    driver: bridge
    internal: true
