services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15.2-alpine}
    container_name: ${APP_NAME:-ztnet-custom}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ztnet}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  zerotier:
    image: ${ZEROTIER_IMAGE:-zyclonite/zerotier:1.14.2}
    hostname: zerotier
    container_name: ${APP_NAME:-ztnet-custom}-zerotier
    restart: unless-stopped
    volumes:
      - zerotier:/var/lib/zerotier-one
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - app-network
    ports:
      - "9993:9993/udp"
    environment:
      - ZT_OVERRIDE_LOCAL_CONF=true
      - ZT_ALLOW_MANAGEMENT_FROM=${APP_SUBNET:-172.31.255.0/29}

  ztnet:
    image: ${ZTNET_IMAGE:-ghcr.io/csbsgyl/ztnet-custom:latest}
    container_name: ${APP_NAME:-ztnet-custom}
    working_dir: /app
    restart: unless-stopped
    volumes:
      - zerotier:/var/lib/zerotier-one
    ports:
      - "${HTTP_PORT:-3000}:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ztnet}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL_INTERNAL: http://ztnet:3000
    networks:
      - app-network
    depends_on:
      - postgres
      - zerotier

volumes:
  zerotier:
  postgres-data:

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${APP_SUBNET:-172.31.255.0/29}
